<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Live Source</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00acee; --bg: #030a13; --card: #101a26; --border: #1e2d3e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .match-card { background: var(--card); border-radius: 16px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .poster { position: relative; width: 100%; aspect-ratio: 16/9; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; bottom: 12px; right: 12px; padding: 5px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; }
        .live { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .up { background: #444; }
        .info { padding: 18px; text-align: center; }
        .teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .vs { width: 35px; height: 35px; background: #1e2d3e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--accent); font-weight: 900; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; background: var(--accent); color: white; text-decoration: none; padding: 14px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; }
        .disabled { background: #222; color: #555; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="catDisplay" style="font-weight:900;">Category</h2>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-size:0.8rem;">HOME</a>
    </div>
    <div id="grid"></div>
</div>

<script>
    // 1. Get Source Name from URL (e.g., category.html?source=FANCODE)
    const params = new URLSearchParams(window.location.search);
    const sourceName = params.get('source') ? params.get('source').toUpperCase() : "";
    document.getElementById('catDisplay').innerText = sourceName || "LIVE DATA";

    async function loadMatches() {
        const grid = document.getElementById('grid');
        
        // 2. Admin se current updated JSON link uthana
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};
        const activeJsonUrl = sources[sourceName];

        if (!activeJsonUrl) {
            grid.innerHTML = `<p style="color:#555; text-align:center; padding-top:50px;">Bhai, Admin Panel mein is category ka JSON link update karo pehle!</p>`;
            return;
        }

        try {
            const res = await fetch(activeJsonUrl);
            const data = await res.json();
            grid.innerHTML = "";

            // FanCode Structure handles "matches" array
            const matchList = data.matches || data; 

            matchList.forEach(m => {
                const stream = m.adfree_url || m.dai_url || m.url1;
                const isLive = m.status === "LIVE";
                
                grid.innerHTML += `
                    <div class="match-card">
                        <div class="poster">
                            <img src="${m.src || m.thumb}">
                            <div class="badge ${isLive?'live':'up'}">${m.status || 'LIVE'}</div>
                        </div>
                        <div class="info">
                            <div style="font-size:0.6rem; color:#666; margin-bottom:10px;">${m.event_name || ''}</div>
                            <div class="teams">
                                <div style="flex:1;">${m.team_1 || m.team1 || 'Team A'}</div>
                                <div class="vs">VS</div>
                                <div style="flex:1;">${m.team_2 || m.team2 || 'Team B'}</div>
                            </div>
                            <div style="color:var(--accent); font-size:0.75rem; margin-bottom:15px;">🕒 ${m.startTime || ''}</div>
                            <a href="player.html?url=${encodeURIComponent(stream)}&title=${encodeURIComponent(m.match_name || m.title)}&thumb=${encodeURIComponent(m.src || m.thumb)}" 
                               class="btn ${!stream ? 'disabled' : ''}">
                                ${stream ? 'WATCH LIVE' : 'SIGNAL OFFLINE'}
                            </a>
                        </div>
                    </div>`;
            });
        } catch (e) {
            grid.innerHTML = "Error: JSON URL update hone ke baad bhi fetch nahi ho raha (CORS ya Invalid JSON).";
        }
    }
    window.onload = loadMatches;
</script>
</body>
</html>
