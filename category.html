<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | M3U & JSON Parser</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --card: #121212; --border: #1e2d3e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .m3u-card { 
            background: var(--card); border-radius: 15px; border: 1px solid var(--border);
            display: flex; align-items: center; padding: 12px; gap: 15px; cursor: pointer;
            transition: 0.3s;
        }
        .m3u-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .m3u-logo { width: 60px; height: 60px; object-fit: contain; background: #000; border-radius: 10px; border: 1px solid #222; }
        .m3u-info { flex: 1; }
        .m3u-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; color: #eee; }
        .m3u-tag { font-size: 0.6rem; color: var(--accent); font-weight: 900; text-transform: uppercase; }
        
        .loader { text-align: center; margin-top: 100px; font-weight: 900; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title" style="margin-bottom:20px; font-weight:900; color:var(--accent);">PARSING SIGNALS...</h2>
    <div id="loader" class="loader">DECRYPTING PLAYLIST...</div>
    <div class="grid" id="dataGrid"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const sourceName = params.get('source') || "LIVE TV";
    document.getElementById('title').innerText = sourceName;

    async function init() {
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};
        const url = sources[sourceName.toUpperCase()];
        const grid = document.getElementById('dataGrid');

        if (!url) {
            document.getElementById('loader').innerText = "NO LINK FOUND IN ADMIN";
            return;
        }

        try {
            const response = await fetch(url);
            const text = await response.text();
            
            // Check if it's M3U or JSON
            if (text.includes("#EXTM3U")) {
                parseM3U(text);
            } else {
                renderJSON(JSON.parse(text));
            }
        } catch (e) {
            document.getElementById('loader').innerText = "FETCH ERROR (CORS BLOCK)";
        }
    }

    // --- M3U Parser Logic ---
    function parseM3U(data) {
        const grid = document.getElementById('dataGrid');
        document.getElementById('loader').style.display = 'none';
        
        const lines = data.split('\n');
        let currentItem = {};

        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                // Extract Logo
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                currentItem.thumb = logoMatch ? logoMatch[1] : "https://via.placeholder.com/100";
                
                // Extract Name
                const nameParts = line.split(',');
                currentItem.title = nameParts[nameParts.length - 1].trim();
            } else if (line.startsWith('http')) {
                currentItem.url = line.trim();
                
                // Create Card
                grid.innerHTML += `
                    <div class="m3u-card" onclick="location.href='player.html?url=${encodeURIComponent(currentItem.url)}&title=${encodeURIComponent(currentItem.title)}'">
                        <img src="${currentItem.thumb}" class="m3u-logo" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="m3u-info">
                            <div class="m3u-tag">SIGNAL STABLE</div>
                            <div class="m3u-name">${currentItem.title}</div>
                        </div>
                    </div>`;
                currentItem = {}; // Reset for next channel
            }
        });
    }

    function renderJSON(data) {
        // Purana JSON rendering logic yahan rahega (FanCode wala)
        document.getElementById('loader').style.display = 'none';
        const list = data.matches || data;
        list.forEach(m => {
            const link = m.adfree_url || m.dai_url || m.url1;
            document.getElementById('dataGrid').innerHTML += `
                <div class="m3u-card" onclick="location.href='player.html?url=${encodeURIComponent(link)}&title=${encodeURIComponent(m.title)}'">
                    <img src="${m.src || m.thumb}" class="m3u-logo">
                    <div class="m3u-info">
                        <div class="m3u-tag">JSON SOURCE</div>
                        <div class="m3u-name">${m.title}</div>
                    </div>
                </div>`;
        });
    }

    window.onload = init;
</script>
</body>
</html>
