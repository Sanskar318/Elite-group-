<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Sony Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: white; font-family: 'Outfit', sans-serif; }
        .sony-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .sony-card:hover { border-color: #ff0055; transform: scale(1.02); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 id="displayTitle" class="text-xl font-black uppercase text-pink-500 tracking-tighter">SOURCE</h1>
            <a href="index.html" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-full border border-white/10">HOME</a>
        </header>

        <div id="matchGrid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sourceName = params.get('source') || "SONY";
        document.getElementById('displayTitle').innerText = sourceName;

        async function parseSonyM3U() {
            const sources = JSON.parse(localStorage.getItem('category_sources')) || {};
            const M3U_URL = sources[sourceName.toUpperCase()];
            const grid = document.getElementById('matchGrid');

            if(!M3U_URL) return;

            try {
                const res = await fetch(M3U_URL);
                const data = await res.text();
                const lines = data.split('\n');
                
                let cur = {};
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        cur.thumb = logoMatch ? logoMatch[1] : '';
                        cur.title = line.split(',')[1] || "Sony Channel";
                    } else if (line.startsWith('http')) {
                        const stream = line.trim();
                        grid.innerHTML += `
                        <div class="sony-card rounded-2xl overflow-hidden p-3 cursor-pointer text-center" 
                             onclick="location.href='player.html?url=${encodeURIComponent(stream)}&title=${encodeURIComponent(cur.title)}'">
                            <img src="${cur.thumb}" class="w-full aspect-square rounded-xl object-contain bg-black mb-3 p-2">
                            <div class="font-bold text-[11px] truncate uppercase">${cur.title}</div>
                        </div>`;
                        cur = {};
                    }
                });
            } catch (e) { console.error("M3U Error"); }
        }
        window.onload = parseSonyM3U;
    </script>
</body>
</html>
