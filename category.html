<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | FanCode Signals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #00acee; --bg: #030a13; --card: #101a26; --border: #1e2d3e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .match-card {
            background: var(--card); border-radius: 16px; margin-bottom: 20px;
            overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .poster { position: relative; width: 100%; aspect-ratio: 16/9; }
        .poster img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.1); }
        
        .badge { position: absolute; bottom: 12px; right: 12px; padding: 5px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; }
        .live { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .up { background: #444; }

        .info { padding: 18px; text-align: center; }
        .event-name { font-size: 0.65rem; color: #8899a6; text-transform: uppercase; margin-bottom: 12px; }
        .teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .team-name { flex: 1; font-weight: 700; font-size: 0.9rem; color: #fff; }
        .vs { width: 35px; height: 35px; background: #1e2d3e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--accent); font-weight: 900; }
        
        .time { font-size: 0.75rem; color: var(--accent); margin-bottom: 18px; font-weight: 600; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; background: var(--accent); color: white; text-decoration: none;
            padding: 14px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; transition: 0.3s;
        }
        .btn:hover { transform: scale(0.96); filter: brightness(1.1); }
        .btn.disabled { background: #222; color: #555; pointer-events: none; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="font-weight:900;">Live & Upcoming</h2>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-size:0.8rem;">HOME</a>
    </div>
    <div id="grid"></div>
</div>

<script>
    const jsonUrl = "https://raw.githubusercontent.com/drmlive/fancode-live-events/refs/heads/main/fancode.json";

    async function loadMatches() {
        const grid = document.getElementById('grid');
        try {
            const res = await fetch(jsonUrl);
            const data = await res.json();
            grid.innerHTML = "";

            data.matches.forEach(m => {
                const stream = m.adfree_url || m.dai_url;
                const isLive = m.status === "LIVE";
                
                grid.innerHTML += `
                    <div class="match-card">
                        <div class="poster">
                            <img src="${m.src}">
                            <div class="badge ${isLive?'live':'up'}">${m.status}</div>
                        </div>
                        <div class="info">
                            <div class="event-name">${m.event_name}</div>
                            <div class="teams">
                                <div class="team-name">${m.team_1}</div>
                                <div class="vs">VS</div>
                                <div class="team-name">${m.team_2}</div>
                            </div>
                            <div class="time">🕒 ${m.startTime}</div>
                            <a href="player.html?url=${encodeURIComponent(stream)}&title=${encodeURIComponent(m.match_name)}&thumb=${encodeURIComponent(m.src)}" 
                               class="btn ${!stream ? 'disabled' : ''}">
                                ${stream ? 'WATCH LIVE' : 'SIGNAL OFFLINE'}
                            </a>
                        </div>
                    </div>`;
            });
            gsap.from(".match-card", {opacity: 0, y: 30, stagger: 0.1});
        } catch (e) { grid.innerHTML = "Error Loading Pipeline..."; }
    }
    window.onload = loadMatches;
</script>
</body>
</html>
