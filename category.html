<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | FanCode Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00acee; --bg: #030a13; --card-bg: #101a26; --border: #1e2d3e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }

        .container { max-width: 500px; margin: 0 auto; }
        
        /* --- FanCode Card Design --- */
        .match-card {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .poster-area {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }
        .poster-area img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-badge {
            position: absolute; bottom: 10px; right: 10px;
            padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 900;
        }
        .live { background: #ff0000; color: white; }
        .upcoming { background: #555; color: white; }

        .event-tag {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 4px 8px;
            border-radius: 6px; font-size: 0.6rem; color: #00acee;
        }

        /* Match Info Section */
        .match-info { padding: 15px; text-align: center; }
        
        .event-name { font-size: 0.7rem; color: #8899a6; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

        .teams-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 10px 0; padding: 0 10px;
        }
        .team-box { flex: 1; text-align: center; }
        .team-box span { display: block; font-weight: 700; font-size: 0.85rem; margin-top: 5px; }
        
        .vs-circle { 
            width: 30px; height: 30px; background: #1e2d3e; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 0.7rem; font-weight: 900; color: var(--accent);
        }

        .match-time { font-size: 0.7rem; color: #00acee; margin-bottom: 15px; font-weight: 600; }

        /* Watch Button */
        .watch-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; background: var(--accent); color: white;
            text-decoration: none; padding: 12px; border-radius: 50px;
            font-weight: 900; font-size: 0.9rem; transition: 0.3s;
        }
        .watch-btn:hover { background: #008fcc; transform: scale(0.97); }
        
        .loader { text-align: center; margin-top: 50px; color: #555; font-weight: 900; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader" class="loader">FETCHING FANCODE SIGNALS...</div>
        <div id="grid"></div>
    </div>

    <script>
        const url = "https://raw.githubusercontent.com/drmlive/fancode-live-events/refs/heads/main/fancode.json";

        async function fetchMatches() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const grid = document.getElementById('grid');
                document.getElementById('loader').style.display = 'none';

                // NOTE: Using data.matches because your JSON has a "matches" key
                data.matches.forEach(match => {
                    const isLive = match.status === "LIVE";
                    
                    grid.innerHTML += `
                        <div class="match-card">
                            <div class="poster-area">
                                <img src="${match.src}" alt="Poster">
                                <div class="event-tag">${match.event_category}</div>
                                <div class="status-badge ${isLive ? 'live' : 'upcoming'}">${match.status}</div>
                            </div>
                            <div class="match-info">
                                <div class="event-name">${match.event_name}</div>
                                <div class="teams-row">
                                    <div class="team-box">
                                        <span style="color:#fff">${match.team_1}</span>
                                    </div>
                                    <div class="vs-circle">VS</div>
                                    <div class="team-box">
                                        <span style="color:#fff">${match.team_2}</span>
                                    </div>
                                </div>
                                <div class="match-time">🕒 ${match.startTime}</div>
                                <a href="player.html?id=${match.match_id}" class="watch-btn">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                                    WATCH LIVE
                                </a>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('loader').innerText = "FAILED TO LOAD DATA";
            }
        }

        window.onload = fetchMatches;
    </script>
</body>
</html>
