<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Signals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00acee; --bg: #030a13; --card: #101a26; --border: #1e2d3e; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; padding: 15px; }
        .grid { display: grid; gap: 15px; max-width: 500px; margin: 0 auto; }
        .fc-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .poster { width: 100%; aspect-ratio: 16/9; position: relative; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .status { position: absolute; bottom: 10px; right: 10px; background: red; padding: 3px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: 900; }
        .info { padding: 15px; text-align: center; }
        .btn { display: block; width: 100%; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 50px; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="grid" id="dataGrid"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const sourceName = params.get('source');
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};
        const url = sources[sourceName];

        async function load() {
            const res = await fetch(url);
            const text = await res.text();
            const grid = document.getElementById('dataGrid');
            
            if(text.includes("#EXTM3U")) {
                const lines = text.split('\n');
                let cur = {};
                lines.forEach(l => {
                    if(l.startsWith('#EXTINF')) {
                        cur.title = l.split(',')[1];
                        const logo = l.match(/tvg-logo="([^"]+)"/);
                        cur.thumb = logo ? logo[1] : '';
                    } else if(l.startsWith('http')) {
                        grid.innerHTML += `<div class="fc-card"><div class="info"><h3>${cur.title}</h3><a href="player.html?url=${encodeURIComponent(l.trim())}&title=${encodeURIComponent(cur.title)}" class="btn">WATCH</a></div></div>`;
                        cur = {};
                    }
                });
            } else {
                const data = JSON.parse(text);
                const matches = data.matches || data;
                matches.forEach(m => {
                    const stream = m.adfree_url || m.dai_url || m.url1;
                    grid.innerHTML += `<div class="fc-card">
                        <div class="poster"><img src="${m.src || m.thumb}"><div class="status">${m.status || 'LIVE'}</div></div>
                        <div class="info"><h4>${m.title || m.match_name}</h4><a href="player.html?url=${encodeURIComponent(stream)}&title=${encodeURIComponent(m.title || m.match_name)}" class="btn">WATCH LIVE</a></div>
                    </div>`;
                });
            }
        }
        window.onload = load;
    </script>
</body>
</html>
