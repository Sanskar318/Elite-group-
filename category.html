<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | M3U Signals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: white; font-family: 'Outfit', sans-serif; }
        .m3u-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .m3u-card:hover { border-color: #0ea5e9; transform: scale(1.02); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-black uppercase text-sky-500 mb-6 tracking-tighter">M3U Pipeline</h1>
        <div id="matchGrid" class="space-y-4"></div>
    </div>

    <script>
        const M3U_URL = 'https://raw.githubusercontent.com/jitendra-unatti/fancode/refs/heads/main/data/fancode.m3u';

        async function parseM3U() {
            try {
                const res = await fetch(M3U_URL);
                const data = await res.text();
                const grid = document.getElementById('matchGrid');
                const lines = data.split('\n');
                
                let currentItem = {};

                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        currentItem.thumb = logoMatch ? logoMatch[1] : '';
                        currentItem.title = line.split(',')[1] || "Live Match";
                    } else if (line.startsWith('http')) {
                        const streamLink = line.trim();
                        grid.innerHTML += `
                        <div class="m3u-card rounded-3xl overflow-hidden p-4 flex items-center gap-4 cursor-pointer" 
                             onclick="location.href='player.html?url=${encodeURIComponent(streamLink)}&title=${encodeURIComponent(currentItem.title)}'">
                            <img src="${currentItem.thumb}" class="w-16 h-16 rounded-xl object-cover bg-black">
                            <div class="flex-1">
                                <div class="text-[10px] text-sky-500 font-bold uppercase tracking-widest">Live Stream</div>
                                <div class="font-bold text-sm">${currentItem.title}</div>
                            </div>
                            <div class="bg-sky-500/20 text-sky-400 p-2 rounded-full"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
                        </div>`;
                        currentItem = {};
                    }
                });
            } catch (err) { console.error("M3U Fetch Error"); }
        }
        window.onload = parseM3U;
    </script>
</body>
</html>
