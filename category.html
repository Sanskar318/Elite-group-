<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | FanCode Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00acee; --bg: #0b1622; --card-bg: #152232; --border: #1e2d3e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; }

        .container { max-width: 600px; margin: 0 auto; }
        .grid { display: flex; flex-direction: column; gap: 20px; }

        /* --- FanCode Styled Card --- */
        .fc-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Top Image Part */
        .fc-banner {
            position: relative;
            height: 180px;
            overflow: hidden;
        }
        .fc-banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .live-tag {
            position: absolute; bottom: 15px; right: 15px;
            background: #ff0000; color: white; padding: 4px 12px;
            border-radius: 8px; font-size: 0.7rem; font-weight: 900;
        }

        .category-tag {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.6); padding: 4px 10px;
            border-radius: 8px; font-size: 0.6rem; display: flex; align-items: center; gap: 5px;
        }

        /* Bottom Info Part */
        .fc-info { padding: 20px; text-align: center; }
        
        .match-teams {
            display: flex; justify-content: space-around; align-items: center;
            margin-bottom: 20px;
        }
        .team { text-align: center; }
        .team img { width: 50px; height: 50px; border-radius: 50%; background: #000; padding: 5px; margin-bottom: 8px; }
        .team span { display: block; font-weight: 800; font-size: 0.9rem; }

        .vs-text { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
        .match-time { font-size: 0.75rem; color: #8899a6; margin-top: 5px; }

        /* Watch Button */
        .btn-watch {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-watch:hover { background: #008fcc; transform: scale(0.98); }

        .btn-watch svg { width: 20px; fill: white; }

    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-bottom: 20px; font-size: 1.5rem;">Live & Upcoming</h2>
        <div class="grid" id="dataGrid">
            </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sourceName = params.get('source') || "FANCODE";

        async function loadData() {
            const grid = document.getElementById('dataGrid');
            const sources = JSON.parse(localStorage.getItem('category_sources')) || {};
            const jsonUrl = sources[sourceName.toUpperCase()];

            if (!jsonUrl) {
                grid.innerHTML = "No JSON URL found in Admin for this category.";
                return;
            }

            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                grid.innerHTML = "";
                data.forEach(item => {
                    grid.innerHTML += `
                        <div class="fc-card">
                            <div class="fc-banner">
                                <img src="${item.thumb}" alt="Match Poster">
                                <div class="category-tag">🏏 Cricket</div>
                                <div class="live-tag">LIVE</div>
                            </div>
                            <div class="fc-info">
                                <div class="match-teams">
                                    <div class="team">
                                        <img src="${item.team1_logo || 'https://via.placeholder.com/50'}" alt="T1">
                                        <span>${item.team1 || 'TEAM A'}</span>
                                    </div>
                                    <div class="vs-text">VS</div>
                                    <div class="team">
                                        <img src="${item.team2_logo || 'https://via.placeholder.com/50'}" alt="T2">
                                        <span>${item.team2 || 'TEAM B'}</span>
                                    </div>
                                </div>
                                <div class="match-time">🕒 ${item.date || 'Today, 07:30 PM'}</div>
                                <br>
                                <a href="player.html?url=${encodeURIComponent(item.url1)}&title=${encodeURIComponent(item.title)}" class="btn-watch">
                                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    Watch Live
                                </a>
                            </div>
                        </div>`;
                });
            } catch (error) {
                grid.innerHTML = "Failed to load JSON data.";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
