<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE PLAYER | Pro Streaming</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #ff0055;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --neon-blue: #00d2ff;
            --neon-green: #00ff41;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Bar - Ultra Glass */
        .player-nav {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            text-decoration: none; color: white; font-size: 0.7rem; font-weight: 800;
            padding: 8px 16px; background: var(--glass); border-radius: 10px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateX(-5px); }

        /* Video Container - Cinematic Depth */
        .video-container {
            width: 95%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background: #000;
            margin-top: 20px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.1);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Status Ticker (New Feature) */
        .status-bar {
            width: 95%; max-width: 1100px;
            padding: 10px 20px;
            display: flex; gap: 20px;
            font-size: 0.6rem; font-weight: 800; color: #444;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-item span { color: var(--neon-blue); }

        /* Controls Panel */
        .controls-panel {
            margin: 15px 0 40px;
            width: 95%;
            max-width: 1100px;
            padding: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 100%);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .server-title { font-size: 0.7rem; color: #666; font-weight: 900; letter-spacing: 1px; }

        .server-grid {
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none;
            padding-bottom: 10px;
        }
        .server-grid::-webkit-scrollbar { display: none; }

        .server-btn {
            padding: 12px 20px; background: var(--glass); border: 1px solid var(--border);
            color: #777; border-radius: 12px; cursor: pointer; font-size: 0.75rem;
            font-weight: 700; transition: 0.3s; white-space: nowrap;
        }

        .server-btn.active {
            background: #fff; color: #000; border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Stream Branding */
        .stream-meta {
            margin-top: 20px; padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .live-badge {
            background: rgba(255, 0, 85, 0.1); color: var(--accent);
            padding: 5px 12px; border-radius: 8px; font-size: 0.65rem;
            font-weight: 900; display: inline-flex; align-items: center; gap: 6px;
        }
        .pulse-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s infinite; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }

        .stream-title { font-family: 'Space Grotesk'; font-size: 1.4rem; margin-top: 10px; }

        /* Responsive Fix for Realme P1 */
        @media (max-width: 768px) {
            .video-container { border-radius: 16px; width: 98%; }
            .stream-title { font-size: 1.1rem; }
            .controls-panel { width: 98%; padding: 15px; }
        }
    </style>
</head>
<body>

    <nav class="player-nav">
        <a href="index.html" class="back-btn">← EXIT</a>
        <div style="font-family: 'Space Grotesk'; font-weight: 900; font-size: 1rem;">ELITE<span>STREAM</span></div>
        <div style="font-size: 0.5rem; color: var(--neon-green); font-weight: 900;">ONLINE</div>
    </nav>

    <div class="status-bar">
        <div class="status-item">LATENCY: <span id="ping">12MS</span></div>
        <div class="status-item">QUALITY: <span>4K-HDR</span></div>
        <div class="status-item">BUFFER: <span style="color: var(--neon-green);">0%</span></div>
    </div>

    <div class="video-container" id="player-box">
        <iframe id="main-player" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" allowfullscreen></iframe>
    </div>

    <div class="controls-panel">
        <div class="panel-header">
            <div class="server-title">SELECT DATA PIPELINE</div>
            <div style="font-size: 0.6rem; color: #444;">8,420 VIEWERS</div>
        </div>
        
        <div class="server-grid">
            <button class="server-btn active" onclick="switchServer('https://www.youtube.com/embed/dQw4w9WgXcQ', this)">PIPELINE 01 (HQ)</button>
            <button class="server-btn" onclick="switchServer('https://www.youtube.com/embed/3JZ_D3ELwOQ', this)">PIPELINE 02 (FAST)</button>
            <button class="server-btn" onclick="switchServer('https://www.youtube.com/embed/2Vv-BfVoq4g', this)">PIPELINE 03 (ALT)</button>
            <button class="server-btn" onclick="switchServer('https://www.youtube.com/embed/V-_O7nl0Ii0', this)">BACKUP LINK</button>
        </div>

        <div class="stream-meta">
            <div>
                <div class="live-badge"><div class="pulse-dot"></div> LIVE BROADCAST</div>
                <h2 class="stream-title" id="display-name">FORMULA 1: MONACO GP</h2>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 0.6rem; color: #555; margin-bottom: 4px;">BITRATE: 8.5 MBPS</p>
                <p style="font-size: 0.6rem; color: var(--neon-blue); font-weight: 900;">ENC: AES-256</p>
            </div>
        </div>
    </div>

    <script>
        function switchServer(url, btn) {
            const playerBox = document.getElementById('player-box');
            const player = document.getElementById('main-player');
            
            // GSAP Cinematic Switch Effect
            gsap.to(playerBox, { 
                opacity: 0, 
                filter: "blur(15px)", 
                scale: 0.98,
                duration: 0.4, 
                onComplete: () => {
                    player.src = url + "?autoplay=1";
                    
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    gsap.to(playerBox, { 
                        opacity: 1, 
                        filter: "blur(0px)", 
                        scale: 1,
                        duration: 0.6, 
                        ease: "power2.out" 
                    });
                }
            });
        }

        // Random Latency Simulation for Pro Feel
        setInterval(() => {
            const ms = Math.floor(Math.random() * (18 - 10 + 1) + 10);
            document.getElementById('ping').innerText = ms + "MS";
        }, 3000);

        window.onload = () => {
            gsap.from(".video-container", { opacity: 0, scale: 0.95, duration: 1, ease: "expo.out" });
            gsap.from(".controls-panel", { opacity: 0, y: 30, duration: 1, delay: 0.4 });
        };
    </script>
</body>
</html>
