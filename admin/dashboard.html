<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELITE ADMIN | SOURCE ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --card: #0d0d0d; --border: rgba(255,255,255,0.08); --neon: #00ff41; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; max-width: 800px; margin: 0 auto 20px; }
        h2 { font-size: 0.9rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-green { background: var(--neon); color: #000; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="panel" style="border-color: var(--neon);">
        <h2>📂 LINK CATEGORY TO JSON SOURCE</h2>
        <input type="text" id="catName" placeholder="Category Name (e.g., FANCODE)">
        <input type="text" id="catJson" placeholder="Direct JSON URL (https://...)">
        <button class="btn btn-green" onclick="mapSource()">Map & Sync Source</button>
    </div>

    <div class="panel">
        <h2>📊 Active Category Sources</h2>
        <div id="sourceList"></div>
    </div>

    <script>
        function mapSource() {
            const name = document.getElementById('catName').value.toUpperCase().trim();
            const url = document.getElementById('catJson').value.trim();
            if(!name || !url) return alert("Fill both fields!");

            let mappings = JSON.parse(localStorage.getItem('category_sources')) || {};
            mappings[name] = url;
            localStorage.setItem('category_sources', JSON.stringify(mappings));
            
            alert(name + " is now linked!");
            location.reload();
        }

        function renderSources() {
            const list = document.getElementById('sourceList');
            const mappings = JSON.parse(localStorage.getItem('category_sources')) || {};
            for (let name in mappings) {
                list.innerHTML += `<div class="list-item">
                    <span><b>${name}</b> → ${mappings[name].substring(0,40)}...</span>
                    <button onclick="removeSource('${name}')" style="background:red; color:white; border:none; border-radius:5px; padding:2px 8px; cursor:pointer;">DEL</button>
                </div>`;
            }
        }

        function removeSource(name) {
            let mappings = JSON.parse(localStorage.getItem('category_sources')) || {};
            delete mappings[name];
            localStorage.setItem('category_sources', JSON.stringify(mappings));
            location.reload();
        }
        window.onload = renderSources;
    </script>
</body>
</html>
