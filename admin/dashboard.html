<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ELITE ADMIN</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; }
        button { width: 100%; padding: 10px; background: #ff0055; color: white; border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Maintenance</h2>
        <button onclick="toggleM()">ON/OFF Site</button>
    </div>
    <div class="card">
        <h2>Source (JSON/M3U)</h2>
        <input id="sn" placeholder="Category Name">
        <input id="su" placeholder="URL">
        <button onclick="saveS()">Sync Source</button>
    </div>
    <div class="card">
        <h2>Manual Signal</h2>
        <input id="mt" placeholder="Title"><input id="mi" placeholder="Image"><input id="mu" placeholder="Stream URL">
        <button onclick="saveM()">Deploy</button>
    </div>
    <script>
        function toggleM() {
            let c = JSON.parse(localStorage.getItem('elite_config')) || {master:true};
            c.master = !c.master;
            localStorage.setItem('elite_config', JSON.stringify(c));
            alert("Maintenance: " + (c.master ? "OFF" : "ON"));
        }
        function saveS() {
            let s = JSON.parse(localStorage.getItem('category_sources')) || {};
            s[document.getElementById('sn').value.toUpperCase()] = document.getElementById('su').value;
            localStorage.setItem('category_sources', JSON.stringify(s));
            alert("Source Saved");
        }
        function saveM() {
            let d = JSON.parse(localStorage.getItem('elite_data')) || [];
            d.push({title:document.getElementById('mt').value, thumb:document.getElementById('mi').value, url1:document.getElementById('mu').value});
            localStorage.setItem('elite_data', JSON.stringify(d));
            alert("Signal Deployed");
        }
    </script>
</body>
</html>
