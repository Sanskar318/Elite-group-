<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tushar Stream | Live</title>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{ --bg:#140836; --card:#1e1155; --header:#0b0228; --text:#fff; --text-muted:rgba(255,255,255,0.85); --accent:#ff2e93; --live:#ff3b3b; --upcoming:#3b82f6; --primary:var(--accent); --radius:12px; }
body{ margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); transition:.3s; padding-bottom: 40px; -webkit-font-smoothing: antialiased; }
header{ display:flex; align-items:center; justify-content:space-between; padding:10px 15px; background:var(--header); position:sticky; top:0; z-index:100; }
.logo{ width:80px; font-family: 'Fjalla One', sans-serif; color: var(--accent); font-size: 20px; font-style: italic; }
.header-actions{ display:flex; align-items:center; gap:12px; }
.icon-btn{ font-size:18px; cursor:pointer; color:var(--text); }
.header-search{ display:none; align-items:center; gap:6px; flex:1; max-width:260px; margin-left:auto; background:rgba(255,255,255,.12); padding:4px 10px; border-radius:20px; }
.header-search input{ flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:13px; }
.categories{ display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin:15px 0; padding: 0 10px; }
.category-btn{ padding:6px 16px; border-radius:20px; background:var(--card); cursor:pointer; font-size:11px; font-weight:700; border: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; }
.category-btn.active{ background:var(--accent); color:white; border-color: var(--accent); }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:15px; }
.card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; position: relative; transition: 0.3s; }
.card:hover { border: 1px solid var(--accent); transform: translateY(-3px); }
.card-image-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
.card-image { width: 100%; height: 100%; object-fit: contain; }
.absolute { position: absolute; }
.badge { padding: 4px 8px; font-size: 9px; border-radius: 4px; color: white; text-transform: uppercase; font-weight: 800; z-index: 2; }
.badge-category { background: var(--accent); top: 8px; left: 8px; }
.status-live { background: var(--live); top: 8px; right: 8px; animation: pulse 1.4s infinite; }
@keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(255,59,59,.7)} 70%{box-shadow:0 0 0 6px rgba(255,59,59,0)} }
.p-4 { padding: 12px; flex: 1; }
.text-xs { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.text-sm { font-size: 14px; font-weight: bold; margin: 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 35px; }
.watch-now { margin-top: 10px; background: rgba(255,255,255,0.1); text-align: center; padding: 5px; border-radius: 6px; font-size: 10px; font-weight: 800; color: var(--accent); border: 1px solid rgba(255,46,147,0.3); }
@media (max-width: 600px){ .grid{ grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; } }
</style>
</head>
<body>

<header>
  <div class="logo">TUSHAR STREAM</div>
  <div id="headerSearch" class="header-search">
    <input id="searchInput" placeholder="Search match...">
    <i class="fa-solid fa-xmark icon-btn" onclick="closeSearch()"></i>
  </div>
  <div id="headerActions" class="header-actions">
    <i class="fa-solid fa-magnifying-glass icon-btn" onclick="openSearch()"></i>
  </div>
</header>

<div id="categories" class="categories">
    <div class="category-btn active" onclick="filterData('All', this)">ALL</div>
</div>

<div id="grid" class="grid">
    <div class="col-span-full text-center py-20 opacity-50">Connecting Pipeline...</div>
</div>

<script>
const grid=document.getElementById('grid');
const categoriesDiv=document.getElementById('categories');
const searchInput=document.getElementById('searchInput');

// 1. URLs Configuration
const FANCODE_API = 'https://fanco.vodep39240327.workers.dev/';
const GITHUB_JSON = 'https://raw.githubusercontent.com/vaathala00/jow/main/output.json?v=' + Date.now();
const PROXY = 'https://api.allorigins.win/raw?url=';

let allMatches=[], activeCategory='All';

function openSearch(){ document.getElementById('headerSearch').style.display='flex'; document.getElementById('headerActions').style.display='none'; searchInput.focus(); }
function closeSearch(){ document.getElementById('headerSearch').style.display='none'; document.getElementById('headerActions').style.display='flex'; searchInput.value=''; filter(); }

// 2. Fetch Hybrid Data
async function loadDashboard() {
    try {
        // Fetch FanCode Data (with Proxy)
        const fanRes = await fetch(PROXY + encodeURIComponent(FANCODE_API));
        const fanData = await fanRes.json();
        const fanMatches = (fanData.matches || []).map(m => ({
            name: m.match_name,
            logo: m.src,
            cat: m.event_category || 'Cricket',
            url: m.adfree_url || m.dai_url,
            isLive: m.status === 'LIVE'
        }));

        // Fetch GitHub JSON
        const gitRes = await fetch(GITHUB_JSON);
        const gitData = await gitRes.json();
        const gitMatches = gitData.map(m => ({
            name: m.name,
            logo: m.logo,
            cat: m.category || 'Live TV',
            url: m.link || m.iframeSrc,
            isLive: true
        }));

        allMatches = [...fanMatches, ...gitMatches];
        buildCategories(allMatches);
        render(allMatches);
    } catch (err) {
        grid.innerHTML = '<div class="text-center py-20 text-red-500">Error Loading Data</div>';
    }
}

function buildCategories(matches){
  const cats=['All',...new Set(matches.map(m=>m.cat))];
  categoriesDiv.innerHTML = '';
  cats.forEach(c=>{
    const b=document.createElement('div');
    b.className='category-btn'+(c==='All'?' active':'');
    b.textContent=c;
    b.onclick=()=>{
      document.querySelectorAll('.category-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      activeCategory=c;
      filter();
    };
    categoriesDiv.appendChild(b);
  });
}

function render(matches){
  grid.innerHTML='';
  matches.forEach(m => {
    const card=document.createElement('div');
    card.className='card';
    card.onclick=()=>location.href=`player.html?url=${encodeURIComponent(m.url)}&title=${encodeURIComponent(m.name)}`;
    
    card.innerHTML=`
      <div class="card-image-container">
        <img src="${m.logo}" class="card-image" loading="lazy" onerror="this.src='https://via.placeholder.com/300x168?text=Live+TV'">
        <span class="absolute badge badge-category">${m.cat}</span>
        <span class="absolute badge status-live">LIVE</span>
      </div>
      <div class="p-4">
        <h3 class="text-xs">Elite Streaming</h3>
        <h2 class="text-sm">${m.name}</h2>
        <div class="watch-now">WATCH HD</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filter(){
  const q=searchInput.value.toLowerCase();
  const filtered=allMatches.filter(m=>{
    const catOk=activeCategory==='All'||m.cat===activeCategory;
    const txt=m.name.toLowerCase().includes(q);
    return catOk&&txt;
  });
  render(filtered);
}

searchInput.addEventListener('input',filter);
window.onload = loadDashboard;
</script>
</body>
</html>
