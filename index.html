<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE STREAM | Future of Live</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #ff0055;
            --bg: #000000;
            --card: #0d0d0d;
            --border-glow: rgba(255, 0, 85, 0.15);
            --text-main: #ffffff;
            --text-dim: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* Maintenance Overlay */
        #maint-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        /* Top Navigation */
        .navbar {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-family: 'Space Grotesk'; font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Ticker Bar */
        .ticker-wrap {
            background: var(--accent); color: white; padding: 8px 0;
            overflow: hidden; font-size: 0.7rem; font-weight: 900; text-transform: uppercase;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Bento Grid Layout */
        .main-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card-unit {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px; position: relative; overflow: hidden;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); cursor: pointer;
            aspect-ratio: 16 / 9;
        }

        .card-unit.portrait { aspect-ratio: 9 / 12; }

        .hero-unit { grid-column: span 2; grid-row: span 2; }

        .card-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.6; transition: 0.5s;
        }

        .card-unit:hover .card-bg { transform: scale(1.1); opacity: 0.8; }

        .card-content {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
        }

        .badge {
            position: absolute; top: 15px; left: 15px;
            background: var(--accent); color: white; padding: 5px 12px;
            border-radius: 10px; font-size: 0.6rem; font-weight: 900;
        }

        .title { font-family: 'Space Grotesk'; font-size: 1.1rem; margin-bottom: 5px; }

        /* Shimmer Loading */
        .shimmer { background: #111; position: relative; overflow: hidden; }
        .shimmer::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .hero-unit { grid-column: span 2; grid-row: span 1; }
        }
    </style>
</head>
<body>

    <div id="maint-screen">
        <h1 style="color: var(--accent); font-family: 'Space Grotesk';">UNDER MAINTENANCE</h1>
        <p style="color: #444; margin-top: 10px;">We are upgrading our servers. Back soon!</p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker-text">CONNECTING TO ELITE SECURE BROADCAST PIPELINE... PLEASE WAIT...</div>
    </div>

    <nav class="navbar">
        <div class="logo">ELITE<span>STREAM</span></div>
        <div style="font-size: 0.6rem; font-weight: 900; color: #444;">V13.5 PRO</div>
    </nav>

    <main class="main-container">
        <div class="bento-grid" id="mainGrid">
            <div class="card-unit hero-unit shimmer"></div>
            <div class="card-unit shimmer"></div>
            <div class="card-unit shimmer"></div>
            <div class="card-unit shimmer"></div>
        </div>
    </main>

    <script>
        // Data Load
        const config = JSON.parse(localStorage.getItem('elite_config')) || { master: true, alert: "Welcome to Elite Stream" };
        const streams = JSON.parse(localStorage.getItem('elite_data')) || [];
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};

        function checkSystem() {
            // Maintenance Check
            if(!config.master) {
                document.getElementById('maint-screen').style.display = 'flex';
                return;
            }

            // Ticker Update
            document.getElementById('ticker-text').innerText = config.alert;

            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('mainGrid');
            
            setTimeout(() => {
                grid.innerHTML = "";

                // 1. Render Manual Streams First
                streams.forEach((s, i) => {
                    let isHero = i === 0 ? 'hero-unit' : '';
                    let isPortrait = s.aspect === 'portrait' ? 'portrait' : '';
                    
                    grid.innerHTML += `
                        <div class="card-unit ${isHero} ${isPortrait}" onclick="location.href='player.html?id=${i}'">
                            <img src="${s.thumb}" class="card-bg">
                            <div class="badge">${s.category}</div>
                            <div class="card-content">
                                <h2 class="title">${s.title}</h2>
                                <p style="font-size:0.6rem; color:#888;">TAP TO WATCH SIGNAL</p>
                            </div>
                        </div>`;
                });

                // 2. Render Dynamic Category Cards (Sources)
                for (let catName in sources) {
                    grid.innerHTML += `
                        <div class="card-unit" onclick="location.href='category.html?name=${catName}'">
                            <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1000" class="card-bg">
                            <div class="badge">SOURCE API</div>
                            <div class="card-content">
                                <h2 class="title" style="color: #00d2ff;">${catName}</h2>
                                <p style="font-size:0.6rem; color:#888;">DYNAMIC JSON CLOUD</p>
                            </div>
                        </div>`;
                }

                gsap.from(".card-unit", { opacity: 0, scale: 0.9, duration: 0.6, stagger: 0.1, ease: "back.out(1.7)" });
            }, 1000);
        }

        window.onload = checkSystem;
    </script>
</body>
</html>
