<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE STREAM | Pro Console</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #ff0055; --bg: #000; --card: #0d0d0d;
            --border: rgba(255, 255, 255, 0.05); --neon-blue: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* Maintenance Overlay */
        #maint-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Navbar */
        .nav-container {
            position: sticky; top: 0; width: 100%; padding: 18px 25px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Space Grotesk'; font-size: 1.3rem; font-weight: 900; }
        .logo span { color: var(--accent); }

        /* Ticker */
        .ticker-bar { background: var(--accent); color: white; padding: 6px; font-size: 0.7rem; font-weight: 900; text-align: center; overflow: hidden; }

        /* Bento Grid */
        .bento-grid { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        @media (min-width: 768px) {
            .bento-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 220px; }
            .hero { grid-column: span 2; grid-row: span 2; }
            .portrait { grid-row: span 2; }
        }

        .card-unit {
            background: var(--card); border: 1px solid var(--border); border-radius: 28px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            justify-content: flex-end; transition: 0.4s; cursor: pointer; min-height: 200px;
        }

        .card-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .card-unit:hover .card-bg { transform: scale(1.1); opacity: 0.7; }

        .card-content { position: relative; z-index: 2; padding: 20px; background: linear-gradient(0deg, black, transparent); }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--accent); padding: 4px 10px; border-radius: 10px; font-size: 0.6rem; font-weight: 900; z-index: 3; }
        .title { font-family: 'Space Grotesk'; font-size: 1.2rem; text-transform: uppercase; }

        /* Shimmer */
        .shimmer { background: #111; position: relative; overflow: hidden; }
        .shimmer::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shim 1.5s infinite; }
        @keyframes shim { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <div id="maint-screen">
        <h1 style="color:var(--accent); font-family:'Space Grotesk';">SYSTEM OFFLINE</h1>
    </div>

    <div class="ticker-bar" id="ticker">CONNECTING...</div>

    <nav class="nav-container">
        <div class="logo">ELITE<span>STREAM</span></div>
        <div style="font-size:0.6rem; color:#444; font-weight:900;">V13.5 FIXED</div>
    </nav>

    <main class="bento-grid" id="mainGrid">
        <div class="card-unit hero shimmer"></div>
        <div class="card-unit shimmer"></div>
        <div class="card-unit shimmer"></div>
    </main>

    <script>
        const config = JSON.parse(localStorage.getItem('elite_config')) || { master: true, alert: "Welcome" };
        const manualStreams = JSON.parse(localStorage.getItem('elite_data')) || [];
        const jsonSources = JSON.parse(localStorage.getItem('category_sources')) || {};

        async function initApp() {
            if(!config.master) {
                document.getElementById('maint-screen').style.display = 'flex';
                return;
            }
            document.getElementById('ticker').innerText = config.alert;
            
            let allData = [...manualStreams];

            // Fetch data from all JSON sources and merge
            for (let cat in jsonSources) {
                try {
                    const res = await fetch(jsonSources[cat]);
                    const data = await res.json();
                    // Har item ko category tag de do
                    const taggedData = data.map(item => ({ ...item, category: cat }));
                    allData = [...allData, ...taggedData];
                } catch (e) { console.error("Source error: ", cat); }
            }

            renderGrid(allData);
        }

        function renderGrid(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";

            data.forEach((s, i) => {
                let cls = "card-unit";
                if(i === 0) cls += " hero";
                if(s.aspect === 'portrait') cls += " portrait";

                grid.innerHTML += `
                    <div class="${cls}" onclick="location.href='player.html?url=${encodeURIComponent(s.url1)}&title=${encodeURIComponent(s.title)}'">
                        <img src="${s.thumb}" class="card-bg">
                        <div class="badge">${s.category || 'LIVE'}</div>
                        <div class="card-content">
                            <h2 class="title">${s.title}</h2>
                        </div>
                    </div>`;
            });
            gsap.from(".card-unit", { opacity: 0, y: 20, stagger: 0.1, duration: 0.8 });
        }

        window.onload = initApp;
    </script>
</body>
</html>
