<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tushar Stream | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f14; font-family: 'Poppins', sans-serif; color: white; }
        .ch-card { background: #161b22; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .ch-card:hover { border-color: #00ffcc; transform: translateY(-3px); box-shadow: 0 10px 20px -10px #00ffcc33; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8 p-5 bg-slate-900/80 rounded-3xl border border-white/5">
        <h1 class="text-xl font-bold tracking-tighter">TUSHAR <span class="text-sky-400">STREAM</span></h1>
        <div class="flex items-center gap-2 bg-red-600/20 text-red-500 px-3 py-1 rounded-full text-[10px] font-black animate-pulse border border-red-500/30">
            <span class="w-2 h-2 bg-red-500 rounded-full"></span> LIVE
        </div>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="channelGrid">
        <div class="col-span-full text-center py-20 text-slate-500 text-sm animate-pulse">Syncing Pipelines...</div>
    </div>

    <script>
        const JSON_URL = 'https://raw.githubusercontent.com/vaathala00/jow/main/output.json';
        // Proxy to bypass CORS for Sony M3U
        const PROXY = 'https://corsproxy.io/?';

        async function loadAllChannels() {
            const grid = document.getElementById('channelGrid');
            try {
                // 1. Fetch JSON (Colors HD etc.)
                const jRes = await fetch(JSON_URL);
                const jsonData = await jRes.json();
                
                // 2. Fetch Sony M3U
                const mRes = await fetch(PROXY + encodeURIComponent(SONY_M3U));
                const mText = await mRes.text();
                const m3uData = parseM3U(mText);

                grid.innerHTML = ''; // Clear loader
                renderChannels([...jsonData, ...m3uData]);

            } catch (err) {
                grid.innerHTML = "<p class='col-span-full text-center text-red-400'>Error loading streams. Check connection.</p>";
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let list = [];
            let temp = {};
            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    const logo = line.match(/tvg-logo="([^"]+)"/);
                    temp.logo = logo ? logo[1] : '';
                    temp.name = line.split(',')[1]?.trim() || "Channel";
                } else if (line.startsWith('http')) {
                    temp.link = line.trim();
                    list.push({...temp});
                    temp = {};
                }
            });
            return list;
        }

        function renderChannels(all) {
            const grid = document.getElementById('channelGrid');
            all.forEach(ch => {
                grid.innerHTML += `
                <div class="ch-card rounded-2xl overflow-hidden p-3" onclick="openPlayer('${encodeURIComponent(ch.link || ch.iframeSrc)}', '${encodeURIComponent(ch.name)}')">
                    <img src="${ch.logo}" class="w-full aspect-square object-contain bg-black rounded-xl mb-3 p-2">
                    <div class="text-[11px] font-bold text-center truncate uppercase tracking-tight">${ch.name}</div>
                </div>`;
            });
        }

        function openPlayer(link, name) {
            window.location.href = `player.html?url=${link}&title=${name}`;
        }

        window.onload = loadAllChannels;
    </script>
</body>
</html>
