<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tushar Stream | JSON Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f14; font-family: 'Poppins', sans-serif; color: white; }
        .ch-card { background: #161b22; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .ch-card:hover { border-color: #00ffcc; transform: translateY(-3px); box-shadow: 0 10px 20px -10px #00ffcc33; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8 p-5 bg-slate-900/80 rounded-3xl border border-white/5">
        <h1 class="text-xl font-bold tracking-tighter uppercase">Tushar <span class="text-sky-400">Stream</span></h1>
        <div class="flex items-center gap-2 bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full text-[10px] font-black border border-sky-500/20">
            JSON ENGINE v1.0
        </div>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="channelGrid">
        <div class="col-span-full text-center py-20 text-slate-500 text-sm animate-pulse">
            Fetching Channels...
        </div>
    </div>

    <script>
        // Sirf aapka JSON link
        const JSON_URL = 'https://raw.githubusercontent.com/vaathala00/jow/main/output.json';

        async function loadChannels() {
            const grid = document.getElementById('channelGrid');
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();

                grid.innerHTML = ''; // Clear loader

                data.forEach(ch => {
                    // JSON fields check: ch.link ya ch.iframeSrc
                    const finalLink = ch.link || ch.iframeSrc;
                    
                    grid.innerHTML += `
                    <div class="ch-card rounded-2xl overflow-hidden p-3" onclick="openPlayer('${encodeURIComponent(finalLink)}', '${encodeURIComponent(ch.name)}')">
                        <img src="${ch.logo}" class="w-full aspect-square object-contain bg-black rounded-xl mb-3 p-2" onerror="this.src='https://via.placeholder.com/150?text=No+Logo'">
                        <div class="text-[11px] font-bold text-center truncate uppercase tracking-tight">${ch.name}</div>
                    </div>`;
                });

            } catch (err) {
                grid.innerHTML = "<p class='col-span-full text-center text-red-400 font-bold'>Failed to load JSON data.</p>";
                console.error(err);
            }
        }

        function openPlayer(link, name) {
            // Player page par data bhej raha hai
            window.location.href = `player.html?url=${link}&title=${name}`;
        }

        window.onload = loadChannels;
    </script>
</body>
</html>
