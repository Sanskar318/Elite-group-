<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE SPORTS | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #0ea5e9; --bg: #02040a; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cat-card { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .cat-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px -10px var(--accent); }
    </style>
</head>
<body class="pb-10">

    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-white">ELITE<span class="text-sky-500">SPORTS</span></div>
        <div class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-2 py-1 rounded">V17 PRO</div>
    </nav>

    <div class="px-5 mt-8">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="w-1 h-6 bg-sky-500 rounded-full"></span> Signal Sources
        </h2>
        <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar" id="catContainer">
            </div>
    </div>

    <div class="px-5 mt-6">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="w-1 h-6 bg-red-500 rounded-full"></span> Top Signals
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="featuredGrid">
            </div>
    </div>

    <script>
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};
        const manuals = JSON.parse(localStorage.getItem('elite_data')) || [];

        function renderIndex() {
            const catBox = document.getElementById('catContainer');
            for(let key in sources) {
                catBox.innerHTML += `
                <div class="cat-card min-w-[140px] h-32 bg-slate-900 rounded-3xl relative overflow-hidden cursor-pointer" onclick="location.href='category.html?source=${key}'">
                    <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=300" class="absolute inset-0 w-full h-full object-cover opacity-30">
                    <div class="absolute bottom-4 w-full text-center font-black text-sm uppercase tracking-wider">${key}</div>
                </div>`;
            }

            const featBox = document.getElementById('featuredGrid');
            manuals.forEach(m => {
                featBox.innerHTML += `
                <div class="bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5 cursor-pointer" onclick="location.href='player.html?url=${encodeURIComponent(m.url1)}&title=${encodeURIComponent(m.title)}'">
                    <img src="${m.thumb}" class="w-full aspect-video object-cover">
                    <div class="p-5">
                        <div class="text-[10px] font-bold text-sky-500 uppercase tracking-widest mb-1">Live Signal</div>
                        <div class="font-bold text-lg text-white truncate">${m.title}</div>
                    </div>
                </div>`;
            });
        }
        window.onload = renderIndex;
    </script>
</body>
</html>
