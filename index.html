<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE STREAM | Pro Console</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #ff0055; --bg: #000; --card: #0d0d0d;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* Maintenance Screen */
        #maint-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Space Grotesk'; text-align: center;
        }

        /* Navbar */
        .nav-container {
            position: sticky; top: 0; width: 100%; padding: 18px 25px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Space Grotesk'; font-size: 1.3rem; font-weight: 900; }
        .logo span { color: var(--accent); }

        /* Ticker Bar */
        .ticker-bar { background: var(--accent); color: white; padding: 6px; font-size: 0.7rem; font-weight: 900; text-align: center; overflow: hidden; letter-spacing: 1px; }

        /* Bento Grid */
        .bento-grid { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        @media (min-width: 768px) {
            .bento-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 220px; }
            .hero { grid-column: span 2; grid-row: span 2; }
            .portrait { grid-row: span 2; }
        }

        .card-unit {
            background: var(--card); border: 1px solid var(--border); border-radius: 28px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            justify-content: flex-end; transition: 0.4s; cursor: pointer; min-height: 200px;
        }

        .card-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .card-unit:hover .card-bg { opacity: 0.6; transform: scale(1.05); }

        .card-content { position: relative; z-index: 2; padding: 20px; background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent); }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--accent); padding: 4px 10px; border-radius: 10px; font-size: 0.6rem; font-weight: 900; z-index: 3; }
        .title { font-family: 'Space Grotesk'; font-size: 1.2rem; text-transform: uppercase; }

        /* Shimmer Loading */
        .shimmer { background: #111; position: relative; overflow: hidden; }
        .shimmer::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shim 1.5s infinite; }
        @keyframes shim { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <div id="maint-screen">
        <h1 style="color:var(--accent);">UNDER MAINTENANCE</h1>
        <p style="color:#555; margin-top:10px;">Check back later.</p>
    </div>

    <div class="ticker-bar" id="ticker">CONNECTING TO SECURE PIPELINE...</div>

    <nav class="nav-container">
        <div class="logo">ELITE<span>STREAM</span></div>
        <div style="font-size:0.6rem; color:#444; font-weight:900;">V13.5 STABLE</div>
    </nav>

    <main class="bento-grid" id="mainGrid">
        <div class="card-unit hero shimmer"></div>
        <div class="card-unit shimmer"></div>
        <div class="card-unit shimmer"></div>
    </main>

    <script>
        // Load configurations
        const config = JSON.parse(localStorage.getItem('elite_config')) || { master: true, alert: "System Live" };
        const manualData = JSON.parse(localStorage.getItem('elite_data')) || [];
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};

        async function init() {
            // 1. Check Maintenance
            if(!config.master) {
                document.getElementById('maint-screen').style.display = 'flex';
                return;
            }

            // 2. Set Ticker
            document.getElementById('ticker').innerText = config.alert;

            // 3. Compile Data
            let combinedData = [...manualData];

            for (let cat in sources) {
                try {
                    const res = await fetch(sources[cat]);
                    const json = await res.json();
                    const tagged = json.map(item => ({ ...item, category: cat }));
                    combinedData = [...combinedData, ...tagged];
                } catch (e) { console.warn("Failed to fetch source: " + cat); }
            }

            render(combinedData);
        }

        function render(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";

            if(data.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column:span 4; padding:50px; color:#333;">No active signals.</p>`;
                return;
            }

            data.forEach((s, i) => {
                let cls = "card-unit";
                if(i === 0) cls += " hero";
                if(s.aspect === 'portrait') cls += " portrait";

                grid.innerHTML += `
                    <div class="${cls}" onclick="location.href='player.html?id=${i}'">
                        <img src="${s.thumb}" class="card-bg">
                        <div class="badge">${s.category || 'LIVE'}</div>
                        <div class="card-content">
                            <h2 class="title">${s.title}</h2>
                        </div>
                    </div>`;
            });

            // Smooth entrance animation
            gsap.from(".card-unit", { opacity: 0, y: 20, stagger: 0.1, duration: 0.8, ease: "power2.out" });
        }

        window.onload = init;
    </script>
</body>
</html>
