<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE STREAM | 4K HDR Console</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #ff0055; --bg: #030303; --card: #080808;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* Navbar Glassmorphism */
        .nav-container {
            position: sticky; top: 0; width: 100%; padding: 18px 25px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(25px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 900; }
        .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .ticker-bar { background: var(--accent); color: white; padding: 6px; font-size: 0.7rem; font-weight: 900; text-align: center; letter-spacing: 1.5px; }

        /* 4K Bento Grid */
        .bento-grid { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 18px; max-width: 1300px; margin: 0 auto; }
        
        @media (min-width: 768px) {
            .bento-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 230px; }
            .hero { grid-column: span 2; grid-row: span 2; }
            .portrait { grid-row: span 2; }
        }

        /* 4K CARD ENGINE */
        .card-unit {
            background: var(--card); border: 1px solid var(--border); border-radius: 32px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            justify-content: flex-end; transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); cursor: pointer;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .card-bg { 
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; 
            opacity: 0.55; transition: 0.8s ease;
            /* 4K IMAGE PROCESSING */
            filter: contrast(1.15) saturate(1.25) brightness(0.9);
        }

        .card-unit:hover .card-bg { opacity: 0.85; transform: scale(1.06); filter: contrast(1.2) saturate(1.4) brightness(1); }
        .card-unit:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }

        .card-content { position: relative; z-index: 2; padding: 25px; background: linear-gradient(0deg, rgba(0,0,0,1) 15%, transparent 100%); }
        
        .badge { 
            position: absolute; top: 18px; left: 18px; background: var(--accent); 
            padding: 5px 14px; border-radius: 12px; font-size: 0.65rem; font-weight: 900; z-index: 3;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        .hdr-tag { position: absolute; top: 18px; right: 18px; font-size: 0.55rem; font-weight: 900; color: #00d2ff; letter-spacing: 1px; }

        .title { font-family: 'Space Grotesk'; font-size: 1.35rem; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,1); }

        .hero { border: 1px solid rgba(255, 0, 85, 0.4); }

        /* Shimmer 4K */
        .shimmer { background: #0a0a0a; position: relative; overflow: hidden; }
        .shimmer::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent); animation: shim 1.8s infinite; }
        @keyframes shim { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <div id="maint-screen" style="position:fixed; inset:0; background:#000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--accent); font-family:'Space Grotesk';">MAINTENANCE MODE</h1>
    </div>

    <div class="ticker-bar" id="ticker">ESTABLISHING 4K SECURE PIPELINE...</div>

    <nav class="nav-container">
        <div class="logo">ELITE<span>STREAM</span></div>
        <div style="font-size:0.6rem; color:#444; font-weight:900; letter-spacing:2px;">ULTRA HD V15</div>
    </nav>

    <main class="bento-grid" id="mainGrid">
        <div class="card-unit hero shimmer"></div>
        <div class="card-unit shimmer"></div>
        <div class="card-unit shimmer"></div>
    </main>

    <script>
        const config = JSON.parse(localStorage.getItem('elite_config')) || { master: true, alert: "System Live" };
        const manualData = JSON.parse(localStorage.getItem('elite_data')) || [];
        const sources = JSON.parse(localStorage.getItem('category_sources')) || {};

        async function init() {
            if(!config.master) { document.getElementById('maint-screen').style.display = 'flex'; return; }
            document.getElementById('ticker').innerText = config.alert;

            let combinedData = [...manualData];
            for (let cat in sources) {
                try {
                    const res = await fetch(sources[cat]);
                    const json = await res.json();
                    combinedData = [...combinedData, ...json.map(item => ({ ...item, category: cat }))];
                } catch (e) { console.warn("Fetch failed: " + cat); }
            }
            render(combinedData);
        }

        function render(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";

            data.forEach((s, i) => {
                let cls = "card-unit";
                if(i === 0) cls += " hero";
                if(s.aspect === 'portrait') cls += " portrait";

                grid.innerHTML += `
                    <div class="${cls}" onclick="location.href='player.html?id=${i}'">
                        <img src="${s.thumb}" class="card-bg">
                        <div class="badge">${s.category || '4K LIVE'}</div>
                        <div class="hdr-tag">4K • HDR10+</div>
                        <div class="card-content">
                            <h2 class="title">${s.title}</h2>
                        </div>
                    </div>`;
            });
            gsap.from(".card-unit", { opacity: 0, scale: 0.95, y: 30, stagger: 0.12, duration: 1, ease: "power4.out" });
        }
        window.onload = init;
    </script>
</body>
</html>
