<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE PLAYER | Pro Broadcast</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #ff0055; --bg: #000; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin:0; display: flex; flex-direction: column; align-items: center; }
        
        .nav { width: 100%; padding: 20px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .video-box { width: 95%; max-width: 1000px; aspect-ratio: 16/9; background: #000; margin-top: 20px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 0 40px rgba(255,0,85,0.15); }
        iframe { width: 100%; height: 100%; border: none; }

        .controls { width: 95%; max-width: 1000px; margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 20px; border: 1px solid var(--border); }
        .server-grid { display: flex; gap: 10px; margin: 15px 0; overflow-x: auto; scrollbar-width: none; }
        .srv-btn { padding: 12px 20px; background: #111; border: 1px solid #333; color: #777; border-radius: 12px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 0.75rem; }
        .srv-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        .meta { display: flex; justify-content: space-between; align-items: flex-start; border-top: 1px solid var(--border); padding-top: 20px; }
        .title { font-size: 1.2rem; font-weight: 900; margin-top: 5px; }
        .badge { background: rgba(255,0,85,0.1); color: var(--accent); padding: 5px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" style="color:white; text-decoration:none; font-weight:900;">← EXIT</a>
        <div style="font-weight:900; color:var(--accent);">ELITE STREAM</div>
    </nav>

    <div class="video-box" id="player-box">
        <iframe id="main-player" src="" allowfullscreen allow="autoplay"></iframe>
    </div>

    <div class="controls">
        <div style="font-size:0.6rem; color:#555; font-weight:900;">SELECT DATA PIPELINE</div>
        <div class="server-grid">
            <button id="s1" class="srv-btn active" onclick="switchS(1)">PIPELINE 01 (HQ)</button>
            <button id="s2" class="srv-btn" onclick="switchS(2)">PIPELINE 02 (ALT)</button>
        </div>

        <div class="meta">
            <div>
                <div class="badge">● LIVE BROADCAST</div>
                <div class="title" id="st-title">LOADING STREAM...</div>
            </div>
            <div style="text-align:right; font-size:0.6rem; color:var(--accent); font-weight:900;">4K ULTRA HD</div>
        </div>
    </div>

<script>
    let activeUrl = "";

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        const title = params.get('title');
        const id = params.get('id');

        // Logic: Agar URL hai (FanCode), nahi toh LocalStorage se uthao (Manual)
        if (url && url !== "null") {
            activeUrl = decodeURIComponent(url);
            document.getElementById('st-title').innerText = decodeURIComponent(title);
            loadPlayer(activeUrl);
        } else if (id !== null) {
            const streams = JSON.parse(localStorage.getItem('elite_data')) || [];
            const s = streams[id];
            if (s) {
                activeUrl = s.url1;
                document.getElementById('st-title').innerText = s.title;
                loadPlayer(activeUrl);
            }
        }
    };

    function loadPlayer(link) {
        gsap.fromTo("#player-box", {opacity:0, scale:0.95}, {opacity:1, scale:1, duration:0.5});
        document.getElementById('main-player').src = link;
    }

    function switchS(n) {
        // Simple switch logic
        document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        loadPlayer(activeUrl); // FanCode has only 1 URL mostly
    }
</script>
</body>
</html>
