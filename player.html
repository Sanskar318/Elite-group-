<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Sony Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer@latest/dist/DPlayer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; height: 100vh; overflow: hidden; }
        #dplayer { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="dplayer"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rawUrl = params.get('url');

        if (rawUrl) {
            const decodedUrl = decodeURIComponent(rawUrl);
            
            // Link aur Headers ko split karna (|)
            const parts = decodedUrl.split('|');
            const streamUrl = parts[0];
            const headerStr = parts[1] || "";

            // Saare headers ko extract karke object mein dalna
            const headers = {};
            if (headerStr) {
                headerStr.split('&').forEach(pair => {
                    const [key, value] = pair.split('=');
                    if (key && value) headers[key] = value;
                });
            }

            const dp = new DPlayer({
                container: document.getElementById('dplayer'),
                autoplay: true,
                theme: '#ff0055',
                video: {
                    url: streamUrl,
                    type: 'customHls',
                    customType: {
                        customHls: function (video) {
                            const hls = new Hls({
                                xhrSetup: function (xhr) {
                                    // SonyLiv specific security headers
                                    if (headers['User-Agent']) xhr.setRequestHeader('User-Agent', headers['User-Agent']);
                                    if (headers['Referer']) xhr.setRequestHeader('Referer', headers['Referer']);
                                    if (headers['Origin']) xhr.setRequestHeader('Origin', headers['Origin']);
                                    if (headers['x-playback-session-id']) xhr.setRequestHeader('x-playback-session-id', headers['x-playback-session-id']);
                                }
                            });
                            hls.loadSource(video.src);
                            hls.attachMedia(video);
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
