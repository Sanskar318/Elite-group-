<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Stream | Hybrid Player</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer@latest/dist/DPlayer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --accent: #00ffcc; --bg: #0b0f14; }
        body { background: var(--bg); color: #fff; font-family: "Segoe UI", sans-serif; }
        .player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 14px; overflow: hidden; box-shadow: 0 0 30px rgba(0, 255, 200, 0.15); }
        #videoFrame, #dplayer { width: 100%; height: 100%; border: none; }
        .live-badge { position: absolute; top: 15px; left: 15px; background: rgba(255, 0, 0, 0.8); color: white; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 900; z-index: 20; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        select { background: #111; color: var(--accent); border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; cursor: pointer; outline: none; }
    </style>
</head>
<body>

<div class="max-w-4xl mx-auto p-4">
    <div class="flex justify-between items-center mb-4 bg-slate-900/50 p-4 rounded-2xl border border-white/5">
        <h1 id="streamName" class="text-lg font-bold truncate text-sky-400">Loading Signal...</h1>
        <div class="flex items-center gap-2 text-xs text-slate-400">
            <i class="fas fa-eye text-sky-500"></i>
            <span id="viewCount">Live</span>
        </div>
    </div>

    <div class="player-container" id="mediaContainer">
        <div class="live-badge">LIVE</div>
        </div>

    <div class="mt-4 flex items-center gap-3">
        <span class="text-xs text-slate-500 uppercase font-bold">Switch Channel:</span>
        <select id="channelSelector" class="flex-1" onchange="changeChannel(this.value)">
            <option value="">Select Channel</option>
        </select>
    </div>

    <div class="grid grid-cols-2 gap-4 mt-6">
        <a href="https://t.me/Tushar_Stream" target="_blank" class="bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl text-center font-bold text-sm transition-all shadow-lg shadow-sky-600/20">
            <i class="fab fa-telegram-plane mr-2"></i> Join Telegram
        </a>
        <button onclick="copyLink()" id="shareBtn" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-center font-bold text-sm border border-white/5 transition-all">
            <i class="fas fa-share-alt mr-2"></i> Share Link
        </button>
    </div>
</div>

<script>
    const container = document.getElementById('mediaContainer');
    const selector = document.getElementById('channelSelector');
    const streamName = document.getElementById('streamName');

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || "1108"; // Default ID

        try {
            const response = await fetch('https://raw.githubusercontent.com/vaathala00/jow/main/output.json');
            const data = await response.json();
            
            // Populate Selector
            data.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                if(c.id === id) opt.selected = true;
                selector.appendChild(opt);
            });

            const channel = data.find(c => c.id === id);
            if (channel) {
                streamName.textContent = channel.name;
                document.title = channel.name + " | Live";
                renderMedia(channel.link);
            }
        } catch (err) { console.error("Data Load Error", err); }
    }

    function renderMedia(link) {
        // Checking if link is a direct stream (m3u8) or has headers (|)
        const isDirectStream = link.includes('.m3u8') || link.includes('|') || link.includes('.mpd');

        if (isDirectStream) {
            // Use DPlayer for direct streams
            container.innerHTML = `<div id="dplayer"></div>`;
            const parts = link.split('|');
            const streamUrl = parts[0];
            const headerStr = parts[1] || "";
            const headers = {};
            if (headerStr) {
                headerStr.split('&').forEach(p => { const [k, v] = p.split('='); headers[k] = v; });
            }

            new DPlayer({
                container: document.getElementById('dplayer'),
                autoplay: true,
                theme: '#00ffcc',
                video: {
                    url: streamUrl,
                    type: 'customHls',
                    customType: {
                        customHls: (video) => {
                            const hls = new Hls({
                                xhrSetup: (xhr) => {
                                    if (headers['User-Agent']) xhr.setRequestHeader('User-Agent', headers['User-Agent']);
                                    if (headers['Referer']) xhr.setRequestHeader('Referer', headers['Referer']);
                                    if (headers['Origin']) xhr.setRequestHeader('Origin', headers['Origin']);
                                }
                            });
                            hls.loadSource(video.src);
                            hls.attachMedia(video);
                        }
                    }
                }
            });
        } else {
            // Use Iframe for normal web links
            container.innerHTML = `<iframe src="${link}" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
        }
    }

    function changeChannel(id) {
        if(id) window.location.search = "?id=" + id;
    }

    async function copyLink() {
        await navigator.clipboard.writeText(window.location.href);
        const btn = document.getElementById('shareBtn');
        btn.innerHTML = `<i class="fas fa-check"></i> Copied!`;
        setTimeout(() => btn.innerHTML = `<i class="fas fa-share-alt mr-2"></i> Share Link`, 2000);
    }

    window.onload = init;
</script>
</body>
</html>
