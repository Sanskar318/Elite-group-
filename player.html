<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELITE PLAYER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --plyr-color-main: #ff0055; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; }
        .player-main { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="text-white">
    <header class="p-4 bg-slate-900 border-b border-slate-800">
        <h1 id="match-title" class="text-xl font-black">Loading...</h1>
    </header>
    <main class="player-main">
        <video id="player" playsinline controls></video>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url');
        const title = params.get('title');
        const video = document.getElementById('player');

        document.getElementById('match-title').textContent = title;

        if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function (xhr) {
                    xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Linux; Android 10; SM-G981B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.162 Mobile Safari/537.36');
                    xhr.setRequestHeader('Referer', 'https://www.sonyliv.com/');
                }
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                const player = new Plyr(video, { autoplay: true });
                player.play();
            });
        } else {
            video.src = streamUrl;
            new Plyr(video, { autoplay: true }).play();
        }
    </script>
</body>
</html>
